<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Temporarily Unavailable - SnapDoc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .error-card {
            text-align: center;
            background: #2a2a2a;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 500px;
        }

        .spinner-grow {
            width: 3rem;
            height: 3rem;
            margin-bottom: 1.5rem;
            color: #0d6efd;
        }

        h1 {
            font-weight: 700;
            margin-bottom: 1rem;
        }

        p {
            color: #aaa;
            margin-bottom: 2rem;
        }

        .btn-retry {
            border-radius: 50px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="error-card">
        <div class="spinner-grow" role="status"></div>
        <h1>Database Initializing</h1>
        <p>The system is currently connecting to the database. This usually takes 30-60 seconds after a fresh deployment
            on Render.</p>
        <button onclick="window.location.reload()" class="btn btn-primary btn-retry">Retry Connection</button>
        <div class="mt-4 small text-muted">Error Code: DNS_RESOLUTION_DELAY</div>
    </div>
</body>

</html>
